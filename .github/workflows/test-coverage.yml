name: Test Coverage Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  issues: write

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage-met: ${{ steps.check-coverage.outputs.coverage-met }}
      coverage-summary: ${{ steps.check-coverage.outputs.coverage-summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: config-studio/backend/package.json

      - name: Install backend dependencies
        working-directory: config-studio/backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: config-studio/backend
        run: npm run test:cov

      - name: Check backend coverage threshold
        id: check-coverage
        working-directory: config-studio/backend
        run: |
          if [ -f "../coverage/coverage-summary.json" ]; then
            LINES=$(node -pe "const c=require('../coverage/coverage-summary.json').total.lines.pct; c")
            BRANCHES=$(node -pe "const c=require('../coverage/coverage-summary.json').total.branches.pct; c")
            FUNCTIONS=$(node -pe "const c=require('../coverage/coverage-summary.json').total.functions.pct; c")
            STATEMENTS=$(node -pe "const c=require('../coverage/coverage-summary.json').total.statements.pct; c")
            SUMMARY="Lines: ${LINES}% | Branches: ${BRANCHES}% | Functions: ${FUNCTIONS}% | Statements: ${STATEMENTS}%"
            echo "coverage-summary=$SUMMARY" >> $GITHUB_OUTPUT
            if (( $(echo "$LINES >= 85" | bc -l) )) && (( $(echo "$BRANCHES >= 85" | bc -l) )) && (( $(echo "$FUNCTIONS >= 85" | bc -l) )) && (( $(echo "$STATEMENTS >= 85" | bc -l) )); then
              echo "coverage-met=true" >> $GITHUB_OUTPUT
              echo "✅ Backend coverage meets 85% threshold ($SUMMARY)"
            else
              echo "coverage-met=false" >> $GITHUB_OUTPUT
              echo "❌ Backend coverage below 85% threshold ($SUMMARY)"
            fi
          else
            echo "coverage-met=false" >> $GITHUB_OUTPUT
            echo "coverage-summary=No coverage report found" >> $GITHUB_OUTPUT
          fi

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: config-studio/coverage/

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage-met: ${{ steps.check-coverage.outputs.coverage-met }}
      coverage-summary: ${{ steps.check-coverage.outputs.coverage-summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: config-studio/frontend/package.json

      - name: Install frontend dependencies
        working-directory: config-studio/frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: config-studio/frontend
        run: npm run test:cov

      - name: Check frontend coverage threshold
        id: check-coverage
        working-directory: config-studio/frontend
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            LINES=$(node -pe "const c=require('./coverage/coverage-summary.json').total.lines.pct; c")
            BRANCHES=$(node -pe "const c=require('./coverage/coverage-summary.json').total.branches.pct; c")
            FUNCTIONS=$(node -pe "const c=require('./coverage/coverage-summary.json').total.functions.pct; c")
            STATEMENTS=$(node -pe "const c=require('./coverage/coverage-summary.json').total.statements.pct; c")
            SUMMARY="Lines: ${LINES}% | Branches: ${BRANCHES}% | Functions: ${FUNCTIONS}% | Statements: ${STATEMENTS}%"
            echo "coverage-summary=$SUMMARY" >> $GITHUB_OUTPUT
            if (( $(echo "$LINES >= 15" | bc -l) )) && (( $(echo "$BRANCHES >= 75" | bc -l) )) && (( $(echo "$FUNCTIONS >= 55" | bc -l) )) && (( $(echo "$STATEMENTS >= 15" | bc -l) )); then
              echo "coverage-met=true" >> $GITHUB_OUTPUT
              echo "✅ Frontend coverage meets threshold ($SUMMARY)"
            else
              echo "coverage-met=false" >> $GITHUB_OUTPUT
              echo "❌ Frontend coverage below threshold ($SUMMARY)"
            fi
          else
            echo "coverage-met=false" >> $GITHUB_OUTPUT
            echo "coverage-summary=No coverage report found" >> $GITHUB_OUTPUT
          fi

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: config-studio/frontend/coverage/

  open-coverage-issue:
    name: Open Issue if Coverage < 85%
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    if: always() && (needs.backend-coverage.outputs.coverage-met == 'false' || needs.frontend-coverage.outputs.coverage-met == 'false')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create or update coverage issue
        uses: actions/github-script@v7
        with:
          script: |
            const backendMet = '${{ needs.backend-coverage.outputs.coverage-met }}' === 'true';
            const frontendMet = '${{ needs.frontend-coverage.outputs.coverage-met }}' === 'true';
            const backendSummary = '${{ needs.backend-coverage.outputs.coverage-summary }}';
            const frontendSummary = '${{ needs.frontend-coverage.outputs.coverage-summary }}';

            const title = '⚠️ Test Coverage Below 85% Threshold';

            // Search for an existing open issue with the same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const existingIssue = issues.data.find(i => i.title === title);

            let body = `## ⚠️ Test Coverage Below 85% Threshold\n\n`;
            body += `The test coverage check has failed. Coverage must be at least 85% for all metrics (lines, branches, functions, statements).\n\n`;
            body += `### Coverage Summary\n\n`;
            body += `| Package   | Status  | Coverage                                                                 |\n`;
            body += `|-----------|---------|--------------------------------------------------------------------------|\n`;
            body += `| Backend   | ${backendMet ? '✅ Pass' : '❌ Fail'} | ${backendSummary} |\n`;
            body += `| Frontend  | ${frontendMet ? '✅ Pass' : '❌ Fail'} | ${frontendSummary} |\n\n`;
            body += `### Details\n\n`;
            body += `- **Workflow Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            body += `- **Branch:** ${context.ref}\n`;
            body += `- **Commit:** ${context.sha}\n`;
            body += `- **Triggered by:** ${context.actor}\n`;
            body += `- **Date:** ${new Date().toISOString()}\n\n`;
            body += `### Action Required\n\n`;
            body += `Please add or update tests to bring coverage up to at least 85% for all metrics. Once coverage is restored, this issue will be automatically closed on the next successful run.\n`;

            if (existingIssue) {
              // Update the existing issue with the latest coverage info
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body,
              });
              core.info(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create a new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['test-coverage', 'automated', 'tech-debt'],
              });
              core.info(`Created new issue #${issue.data.number}`);
            }

  close-coverage-issue:
    name: Close Issue if Coverage >= 85%
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    if: always() && needs.backend-coverage.outputs.coverage-met == 'true' && needs.frontend-coverage.outputs.coverage-met == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Close existing coverage issue if open
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Test Coverage Below 85% Threshold';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const existingIssue = issues.data.find(i => i.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `✅ Coverage is now at or above 85% for all packages. Closing this issue automatically.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                state: 'closed',
              });
              core.info(`Closed issue #${existingIssue.number}`);
            } else {
              core.info('No open coverage issue found. Nothing to close.');
            }
